services:
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: my-super-secret-password
      POSTGRES_USER: app
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "app", "-U", "app"]
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    ports:
      - "${POSTGRES_HOST_PORT:-5440}:5432"

  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT:-8090}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    depends_on:
      - database

  php:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/var/www/html:rw
      - vendor:/var/www/html/vendor
      - var:/var/www/html/var
    environment:
      DATABASE_URL: postgresql://app:my-super-secret-password@database:5432/app?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default
      MAILER_DSN: smtp://mailer:1025
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_DEFAULT_CITY: ${OPENWEATHER_DEFAULT_CITY:-Paris,FR}
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8091}:8000"
    entrypoint: ["sh", "/var/www/html/docker/entrypoint.sh"]

  messenger-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/var/www/html:rw
      - vendor:/var/www/html/vendor
      - var:/var/www/html/var
    environment:
      DATABASE_URL: postgresql://app:my-super-secret-password@database:5432/app?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default
      MAILER_DSN: smtp://mailer:1025
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_DEFAULT_CITY: ${OPENWEATHER_DEFAULT_CITY:-Paris,FR}
    depends_on:
      database:
        condition: service_healthy
    command: >
      sh -c "while true; do
        php bin/console app:reservation:expire-pending --no-interaction;
        php bin/console app:reservation:complete-past --no-interaction;
        php bin/console app:ical:sync --no-interaction;
        php bin/console messenger:consume async -vv --time-limit=3600;
      done"


